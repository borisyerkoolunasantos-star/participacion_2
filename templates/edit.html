{% extends 'base.html' %}

{% block content %}
<h2>Editar Persona</h2>

<form method="POST">
    <input type="text" name="nombre" value="{{ persona.nombre }}" class="form-control mb-2">
    <input type="text" name="telefono" value="{{ persona.telefono }}" class="form-control mb-2">
    <input type="date" name="fecha" value="{{ persona.fecha_nac }}" class="form-control mb-2">

    <button class="btn btn-success">Actualizar</button>
</form>
{% endblock %}
